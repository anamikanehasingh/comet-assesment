name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://comet:comet@localhost:5432/comet_test
      REDIS_URL: redis://localhost:6379/15
      APP_ENV: local

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: comet
          POSTGRES_PASSWORD: comet
          POSTGRES_DB: comet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U comet -d comet_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Pytest with coverage
        run: pytest -q --cov=app --cov-report=term --cov-report=xml --cov-fail-under=65

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-xml
          path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build smoke test
        run: docker build -f docker/Dockerfile .
